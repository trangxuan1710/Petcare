server:
  port: ${PORT:8080}
  servlet:
    context-path: /api
spring:
  application:
    name: example
  datasource:
    url: jdbc:mysql://localhost:3306/petical
    username: root
    password: 12345
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
jwt:
  secret: rwRmJZxHfsWI+KPbo61swwhhk8V7iLA0JPFAsuFpviU=
  expiration: 10000000000
  issuer: petical
logging:
  file:
    path: ./logs
  level:
    root: INFO
storage: ./storage
app:
  seed:
    mock:
      enabled: true
